<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMOKADEM | Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --voda-red: #e60000;
            --orange-color: #FF6600;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0; background-color: var(--dark-bg); color: #fff;
            font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.98)), url('background.jpeg') center/cover;
            z-index: -1;
        }

        .profile-section { text-align: center; padding: 40px 20px; width: 100%; max-width: 420px; box-sizing: border-box; }
        .profile-img { width: 115px; height: 115px; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; margin-bottom: 15px; object-fit: cover; }
        .brand-name { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .brand-sub { font-size: 10px; letter-spacing: 4px; color: var(--gold); margin-top: 5px; text-transform: uppercase; opacity: 0.8; }

        /* حاوية الروابط */
        .links-container { width: 100%; margin-top: 35px; }
        
        .link-item {
            display: flex; align-items: center; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
            padding: 14px; margin-bottom: 12px; text-decoration: none; color: #fff;
            transition: 0.3s ease;
        }
        .link-item:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); transform: translateY(-2px); }
        
        .link-item i { width: 35px; font-size: 20px; text-align: center; margin-left: 15px; }
        .link-text { flex-grow: 1; font-size: 14px; font-weight: 500; text-align: right; }

        /* تمييز زرار الحجز */
        .booking-link {
            border: 1px solid var(--gold);
            background: linear-gradient(45deg, rgba(212,175,55,0.1), rgba(0,0,0,0));
            margin-top: 20px;
        }

        /* المودال (نافذة الدفع) */
        #deposit-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-card {
            background: #0d0d0d; width: 90%; max-width: 380px; border-radius: 28px;
            border: 1px solid rgba(212,175,55,0.2); padding: 40px 25px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .wallet-grid { display: flex; gap: 15px; margin: 30px 0; }
        .wallet-box {
            flex: 1; background: #151515; border: 1px solid #222; border-radius: 20px;
            padding: 25px 10px; cursor: pointer; transition: 0.4s;
            display: flex; flex-direction: column; align-items: center;
        }
        .wallet-box i { font-size: 35px; margin-bottom: 12px; color: #333; transition: 0.3s; }
        .wallet-box span { font-size: 11px; font-weight: 600; color: #666; }

        /* الحالات النشطة للأيقونات */
        .voda-active { border-color: var(--voda-red); background: rgba(230,0,0,0.05); }
        .voda-active i { color: var(--voda-red); transform: scale(1.1); }
        .voda-active span { color: #fff; }

        .orange-active { border-color: var(--orange-color); background: rgba(255,102,0,0.05); }
        .orange-active i { color: var(--orange-color); transform: scale(1.1); }
        .orange-active span { color: #fff; }

        .input-group { display: none; animation: slideUp 0.4s ease; }
        .amount-input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #222;
            color: #fff; font-size: 32px; text-align: center; padding: 10px; margin-bottom: 25px; outline: none;
            font-family: 'Cinzel', serif;
        }
        .confirm-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .cancel-text { margin-top: 25px; color: #444; cursor: pointer; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="profile-section">
    <img src="profile.jpg" class="profile-img" alt="ELMOKADEM">
    <h1 class="brand-name">ELMOKADEM</h1>
    <div class="brand-sub">Wedding Photographer</div>

    <div class="links-container">
        <a href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" class="link-item" target="_blank">
            <i class="fas fa-user-circle" style="color: #1877F2;"></i>
            <span class="link-text">Personal Profile</span>
        </a>
        <a href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" class="link-item" target="_blank">
            <i class="fab fa-facebook-f" style="color: #1877F2;"></i>
            <span class="link-text">Facebook Page</span>
        </a>
        <a href="https://www.instagram.com/elmokadem_photographer" class="link-item" target="_blank">
            <i class="fab fa-instagram" style="color: #E4405F;"></i>
            <span class="link-text">Instagram</span>
        </a>
        <a href="https://www.tiktok.com/@elmokadem.photographar" class="link-item" target="_blank">
            <i class="fab fa-tiktok" style="color: #fff;"></i>
            <span class="link-text">TikTok</span>
        </a>
        <a href="https://wa.me/201210425901" class="link-item" target="_blank">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span class="link-text">WhatsApp</span>
        </a>
        
        <div class="link-item booking-link" onclick="openDeposit()">
            <i class="fas fa-calendar-check" style="color: var(--gold);"></i>
            <span class="link-text" style="color: var(--gold); font-weight: 700;">Booking Deposit | تأكيد الحجز</span>
        </div>
    </div>
</div>

<div id="deposit-modal">
    <div class="modal-card">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); margin: 0; letter-spacing: 2px;">DEPOSIT</h2>
        <p style="font-size: 11px; color: #555; margin-top: 5px;">اختر نوع المحفظة للمتابعة</p>
        
        <div class="wallet-grid">
            <div class="wallet-box" id="voda-box" onclick="selectType('voda')">
                <i class="fas fa-mobile-alt"></i>
                <span>فودافون كاش</span>
            </div>
            <div class="wallet-box" id="orange-box" onclick="selectType('orange')">
                <i class="fas fa-phone-square-alt"></i>
                <span>أورانج كاش</span>
            </div>
        </div>

        <div id="payment-ui" class="input-group">
            <input type="number" class="amount-input" id="amt-value" placeholder="دخل المبلغ هنا">
            <button id="main-btn" class="confirm-btn" onclick="goCall()">اتصال الآن | Call Now</button>
        </div>

        <div class="cancel-text" onclick="closeDeposit()">إغلاق</div>
    </div>
</div>

<script>
    let currentType = '';
    const MY_VODA = "01092217287";
    const MY_ORANGE = "01210425901";

    function openDeposit() { document.getElementById('deposit-modal').style.display = 'flex'; }
    function closeDeposit() { 
        document.getElementById('deposit-modal').style.display = 'none';
        currentType = '';
        document.getElementById('payment-ui').style.display = 'none';
        document.getElementById('voda-box').className = 'wallet-box';
        document.getElementById('orange-box').className = 'wallet-box';
    }

    function selectType(t) {
        currentType = t;
        document.getElementById('payment-ui').style.display = 'block';
        document.getElementById('voda-box').className = 'wallet-box' + (t === 'voda' ? ' voda-active' : '');
        document.getElementById('orange-box').className = 'wallet-box' + (t === 'orange' ? ' orange-active' : '');
        
        const btn = document.getElementById('main-btn');
        btn.style.backgroundColor = (t === 'voda' ? 'var(--voda-red)' : 'var(--orange-color)');
