<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>المقدم فوتوغرافر | ElmoKaDem Photography</title>
    <meta property="og:title" content="المقدم فوتوغرافر 📸">
    <meta property="og:description" content="أهلاً بك مع المقدم فوتوغرافر.. احجز جلستك الآن.">
    <meta property="og:image" content="profile.jpg"> 

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --accent-color: #fff;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex;
            justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .button {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-blur);
            border: 1px solid var(--border-color);
            color: white;
            text-decoration: none;
            margin: 8px 0;
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            padding: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ستايل زرار الحجز المميز */
        .booking-btn {
            background: linear-gradient(135deg, #d4af37 0%, #8a6d05 100%);
            border: none;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 20px;
        }
        .booking-btn .btn-text {
            color: #000;
            font-weight: 700;
            font-size: 16px;
        }
        .booking-btn .icon-box {
            background: rgba(0,0,0,0.8);
            color: var(--gold);
        }

        .icon-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 400;
            padding-right: 42px;
        }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: #e60000; font-size: 12px; font-weight: bold;}
        
        .eid-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold) !important;
            border: 1px solid var(--gold);
            margin-bottom: 10px;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.4);
        }

        /* --- Modal & Wheel Styles Stay Same --- */
        #wheel-modal, #call-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <a class="button booking-btn" href="https://wa.me/201210425901?text=أهلاً%20المقدم%20فوتوغرافر،%20كنت%20محتاج%20استفسر%20عن%20مواعيد%20حجز%20جلسة%20تصوير." target="_blank">

    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">

        <div class="btn-text">Facebook Page</div>
    </a>

    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div>
        <div class="btn-text">Instagram</div>
    </a>
    
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div>
        <div class="btn-text">TikTok</div>
    </a>
    
    <div class="button call" onclick="openCallModal()">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
        <div class="btn-text">Call Me</div>
    </div>

    <div class="button vfcash" onclick="handleVFCash()">
        <div class="icon-box">VF</div>
        <div class="btn-text">Vodafone Cash</div>
    </div>
</div>

</html>
