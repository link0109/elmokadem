<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ELMOKADEM Photography</title>
    <meta property="og:title" content="المقدم فوتوغرافر">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
            --dark-bg: rgba(0, 0, 0, 0.75);
        }

        body {
            margin: 0;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: var(--dark-bg);
            width: 100%; 
            min-height: 100vh;
            padding: 50px 20px; 
            box-sizing: border-box;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .profile {
            width: 130px; 
            height: 130px; 
            border-radius: 50%;
            object-fit: cover; 
            border: 3px solid var(--gold); 
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .brand-container { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        
        .brand-name { 
            font-family: 'Cinzel', serif; 
            color: #fff; 
            font-size: 34px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin: 0; 
        }
        
        .brand-sub { 
            color: var(--gold); 
            font-size: 12px; 
            letter-spacing: 7px; 
            text-transform: uppercase; 
            margin-top: 8px; 
            font-weight: bold;
        }

        .button {
            display: flex; 
            align-items: center; 
            background: var(--bg-blur);
            border: 1px solid var(--border-color); 
            color: white;
            text-decoration: none; 
            margin: 10px 0; 
            width: 100%; 
            max-width: 380px;
            border-radius: 15px; 
            padding: 8px; 
            transition: all 0.3s ease; 
            cursor: pointer;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: var(--gold);
        }

        .icon-box { 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            font-size: 20px; 
            color: #fff; 
        }

        .btn-text { 
            flex-grow: 1; 
            text-align: center; 
            font-size: 16px; 
            font-weight: 500;
            padding-left: 45px; /* موازن لتوسيط النص بدقة */
        }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: #e60000; font-size: 14px; font-weight: bold; }
        
        .booking-btn { 
            border: 2px solid var(--gold); 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 100%);
            margin-bottom: 25px;
        }

        /* Modals */
        #booking-modal, #call-modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid var(--gold); 
            width: 85%; 
            max-width: 400px; 
            text-align: right; 
            color: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
        }

        select, input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border-radius: 10px; 
            background: #000; 
            color: white; 
            border: 1px solid #333; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--gold);
        }

        .confirm-btn { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 25px; 
            cursor: pointer; 
            transition: transform 0.2s;
        }

        .confirm-btn:active {
            transform: scale(0.98);
        }

        .close-text {
            text-align: center; 
            color: #888; 
            cursor: pointer; 
            margin-top: 20px;
            font-size: 14px;
            display: block;
        }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ELMOKADEM">
    
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button booking-btn" onclick="openBooking()">
        <div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">احجز الآن | Book Now</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div>
        <div class="btn-text">Personal Profile</div>
    </a>
