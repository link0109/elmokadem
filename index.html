<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ELMOKADEM Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex; justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%; min-height: 100vh;
            padding: 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }

        .profile {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--gold); margin-bottom: 20px;
        }

        .brand-container { text-align: center; margin-bottom: 30px; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }

        /* تعديل الأزرار لتكون النصوص في المنتصف تماماً */
        .button {
            display: flex; align-items: center; background: var(--bg-blur);
            border: 1px solid var(--border-color); color: white;
            text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px;
            border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer;
            position: relative;
        }

        .icon-box { 
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-size: 18px; color: #fff; 
            position: absolute; left: 6px; /* تثبيت الأيقونة أقصى اليسار */
        }

        .btn-text { 
            flex-grow: 1; text-align: center; font-size: 15px; width: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: #e60000; font-size: 12px; font-weight: bold; }
        
        .booking-btn { 
            border: 2px solid var(--gold); 
            background: var(--gold);
            color: black;
            margin-bottom: 20px;
        }
        .booking-btn .icon-box { background: black; color: var(--gold); }

        #booking-modal, #call-modal, #vfcash-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 380px; text-align: right; color: white; }
        
        select, input { 
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; 
            background: #000; color: white; border: 1px solid #333; 
            box-sizing: border-box; font-family: 'Montserrat', sans-serif;
            font-size: 14px; outline: none;
        }

        .confirm-btn { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ELMOKADEM">
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button booking-btn" onclick="openBooking()">
        <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">احجز الآن | Book Now</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div><div class="btn-text">Personal Profile</div>
    </a>

    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fab fa-facebook-f"></i></div><div class="btn-text">Facebook Page</div>
    </a>

    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div>
    </a>

    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div>
    </a>

    <a class="button wa" href="https://wa.me/201210425901" target="_blank">
        <div class="icon-box"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div>
    </a>

    <div class="button call" onclick="openCallModal()">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div><div class="btn-text">اتصل بنا | Call Me</div>
    </div>

    <div class="button vfcash" onclick="openVFCash()">
        <div class="icon-box">VF</div><div class="btn-text">فودافون كاش | Vodafone Cash</div>
    </div>
</div>

<div id="vfcash-modal">
    <div class="modal-content" style="text-align:center;">
        <h3 style="color:var(--gold);">تحويل فودافون كاش</h3>
        <input type="text" inputmode="decimal" id="cash-amount" placeholder=" أدخل المبلغ هنا " style="text-align:center; font-size:18px;">
        <button class="confirm-btn" onclick="makeVFCashCall()" style="background:#e60000; color:white;">اتصال وتحويل الآن</button>
        <p onclick="closeVFCash()" style="color:#888; cursor:pointer; margin-top:15px;">إغلاق</p>
    </div>
</div>

<div id="booking-modal">...</div> 
<div id="call-modal">...</div>

<script>
// دالة تحويل الأرقام (عربي/إنجليزي)
function convertNumbers(str) {
    const arabicNums = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
    for (let i = 0; i < 10; i++) {
        str = str.replace(arabicNums[i], i);
    }
    return str;
}

// تحويل تلقائي داخل حقل المبلغ
document.getElementById('cash-amount').addEventListener('input', function() {
    this.value = convertNumbers(this.value);
});

function openBooking() { document.getElementById('booking-modal').style.display = 'flex'; }
function closeBooking() { document.getElementById('booking-modal').style.display = 'none'; }
function openCallModal() { document.getElementById('call-modal').style.display = 'flex'; }
function closeCallModal() { document.getElementById('call-modal').style.display = 'none'; }
function openVFCash() { document.getElementById('vfcash-modal').style.display = 'flex'; }
function closeVFCash() { document.getElementById('vfcash-modal').style.display = 'none'; }

function makeVFCashCall() {
    let amount = document.getElementById('cash-amount').value;
    amount = convertNumbers(amount); 
    if(!amount) { alert("يرجى كتابة المبلغ أولاً يا فندم"); return; }
    const phoneNumber = "01092217287";
    const ussd = `*9*7*${phoneNumber}*${amount}%23`;
    window.location.href = `tel:${ussd}`;
    closeVFCash();
}
// باقي كود التليجرام والواتساب يظل كما هو
</script>
</body>
</html>
