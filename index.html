<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ELMOKADEM Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.35);
            --input-bg: rgba(255, 255, 255, 0.07);
        }

        body { margin: 0; font-family: 'Montserrat', 'Cairo', sans-serif; background: #0f0f0f url('background.jpeg') no-repeat center center/cover; display: flex; justify-content: center; overflow-y: auto; }
        .overlay { backdrop-filter: blur(15px) saturate(160%); -webkit-backdrop-filter: blur(15px) saturate(160%); background: rgba(0, 0, 0, 0.7); width: 100%; min-height: 100vh; padding: 30px 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .profile { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 20px; }
        .brand-container { text-align: center; margin-bottom: 12px; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }
        .button { display: flex; align-items: center; background: var(--bg-blur); border: 1px solid var(--border-color); color: white; text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px; border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer; }
        .icon-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 18px; color: #fff; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 15px; padding-right: 42px; }
        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: var(--gold); color: #000; }
        .booking-btn { border: 2px solid var(--gold); background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 100%); }
        .footer-copyrights { margin-top: 15px; text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 12px; }

        #booking-modal, #call-modal, #payment-selection-modal, #vfcash-modal, #orange-cash-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 5000; justify-content: center; align-items: center; }
        .premium-modal-content { background: linear-gradient(145deg, rgba(40, 40, 40, 0.95) 0%, rgba(25, 25, 25, 0.98) 100%); border: 1px solid rgba(212, 175, 55, 0.35); padding: 35px 25px; border-radius: 28px; width: 90%; max-width: 390px; text-align: right; color: white; box-sizing: border-box; }
        .modal-header-title { text-align: center; color: var(--gold); margin: 0 0 4px 0; font-size: 25px; }
        .modal-header-sub { text-align: center; color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 25px; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group label { font-size: 13px; color: rgba(255, 255, 255, 0.75); margin-bottom: 6px; display: block; }
        .premium-input { width: 100%; padding: 14px 16px; border-radius: 14px; background: var(--input-bg); color: white; border: 1px solid rgba(255, 255, 255, 0.2); font-size: 15px; outline: none; min-height: 52px; text-align: right; box-sizing: border-box; appearance: none; }
        .premium-confirm-btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .close-modal-text { text-align: center; color: rgba(255, 255, 255, 0.5); cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ELMOKADEM">
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>
    <div class="button booking-btn" onclick="openBooking()"><div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-calendar-check"></i></div><div class="btn-text">احجز الآن | Book Now</div></div>
    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank"><div class="icon-box"><i class="fas fa-user-circle"></i></div><div class="btn-text">Personal Profile</div></a>
    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank"><div class="icon-box"><i class="fab fa-facebook-f"></i></div><div class="btn-text">Facebook Page</div></a>
    <a class="button ig" href="https://www.instagram.com/elmokadem_ph" target="_blank"><div class="icon-box"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div></a>
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank"><div class="icon-box"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div></a>
    <a class="button wa" href="https://wa.me/201210425901" target="_blank"><div class="icon-box"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div></a>
    <div class="button call" onclick="openCallModal()"><div class="icon-box"><i class="fas fa-phone-alt"></i></div><div class="btn-text">اتصل بنا | Call Me</div></div>
    <div class="button vfcash" onclick="openPaymentSelection()"><div class="icon-box"><i class="fas fa-money-bill-wave"></i></div><div class="btn-text">تحويل المبلغ | Transfer Money</div></div>
    <div class="footer-copyrights">© ELMOKADEM Photographer</div>
</div>

<div id="booking-modal">
    <div class="premium-modal-content">
        <h3 class="modal-header-title">تفاصيل الحجز</h3>
        <p class="modal-header-sub">ألف مبروك يا فندم 🎉</p>
        
        <div class="input-group">
            <label>المناسبة (Event Type):</label>
            <select id="session-type" class="premium-input" onchange="handleConditionalFields()">
                <option value="" disabled selected>اضغط لاختيار المناسبة</option>
                <option value="سيشن زفاف (Wedding Session)"> سيشن زفاف (Wedding Session)</option>
                <option value="سيشن زفاف و قاعة (Session & Party)"> سيشن زفاف وقاعة (Session & Party)</option>
                <option value="سيشن كتب كتاب (Katb Ktab Session)"> سيشن كتب كتاب (Katb Ktab Session)</option>
                <option value="كتب كتاب في البيت (Katb Ktab)"> كتب كتاب في البيت (Katb Ktab)</option>
                <option value="سيشن خطوبة (Engagement Session)"> سيشن خطوبة (Engagement Session)</option>
                <option value="سيشن خطوبة و قاعة (Session & Party)"> سيشن خطوبة و قاعة (Session & Party)</option>
                <option value="خطوبة في البيت أو كافيه (Home or Cafe Engagement)"> خطوبة في البيت أو كافيه (Home or Cafe Engagement)</option>
                <option value="قاعة أو فرح (Party)"> قاعة أو فرح (Party)</option>
                <option value="عيد ميلاد (Birthday)"> عيد ميلاد (Birthday)</option>
                <option value="حفلة تخرج (Graduation Party)"> حفلة تخرج (Graduation Party)</option>
            </select>
        </div>

        <div class="input-group">
            <label>التاريخ (Date):</label>
            <input type="date" id="session-date" class="premium-input">
        </div>

        <div id="time-selection" class="input-group" style="display:none;">
            <label>موعد كتب الكتاب (Timing):</label>
            <select id="session-time" class="premium-input">
                <option value="" disabled selected>اضغط لتحديد الموعد</option>
                <option value="بعد صلاة العصر">بعد صلاة العصر</option>
                <option value="بعد صلاة المغرب">بعد صلاة المغرب</option>
                <option value="بعد صلاة العشاء">بعد صلاة العشاء</option>
            </select>
        </div>

        <div id="address-selection" class="input-group" style="display:none;">
            <label>العنوان (Address):</label>
            <input type="text" id="user-address" class="premium-input" placeholder="ادخل العنوان بالتفصيل هنا">
        </div>

        <div id="hall-selection" class="input-group" style="display:none;">
            <label>مكان الفرح (Hall Name):</label>
            <input type="text" id="hall-name" class="premium-input" placeholder="ادخل اسم القاعة هنا">
        </div>

        <div class="input-group">
            <label>الاسم (Full Name):</label>
            <input type="text" id="user-name" class="premium-input" placeholder="اكتب اسم حضرتك هنا">
        </div>
        
        <button class="premium-confirm-btn" onclick="sendToWhatsApp()">تأكيد الحجز عبر واتساب</button>
        <p onclick="closeBooking()" class="close-modal-text">إغلاق</p>
    </div>
</div>

<script>
// الدوال الأصلية للعمليات (جوجل شيت، تليجرام، إلخ)
function openBooking() { document.getElementById('booking-modal').style.display = 'flex'; }
function closeBooking() { document.getElementById('booking-modal').style.display = 'none'; }
function handleConditionalFields() {
    const val = document.getElementById('session-type').value;
    document.getElementById('time-selection').style.display = (val.includes("كتب كتاب في البيت")) ? "block" : "none";
    document.getElementById('address-selection').style.display = (val.includes("بيت") || val.includes("كافيه")) ? "block" : "none";
    document.getElementById('hall-selection').style.display = (val.includes("قاعة") || val.includes("فرح")) ? "block" : "none";
}

function sendToWhatsApp() {
    const name = document.getElementById('user-name').value;
    const type = document.getElementById('session-type').value;
    const date = document.getElementById('session-date').value;
    const time = document.getElementById('session-time').value;
    const address = document.getElementById('user-address').value;
    const hall = document.getElementById('hall-name').value;
    
    if(!name || !type || !date) { alert("من فضلك أكمل البيانات الأساسية"); return; }
    
    let msg = `تم الحجز يا مقدم :\nالاسم: ${name}\nالمناسبة: ${type}\nالتاريخ: ${date}`;
    if(document.getElementById('time-selection').style.display !== "none") msg += `\nالموعد: ${time}`;
    if(document.getElementById('address-selection').style.display !== "none") msg += `\nالعنوان: ${address}`;
    if(document.getElementById('hall-selection').style.display !== "none") msg += `\nمكان الفرح: ${hall}`;
    
    window.open(`https://wa.me/201210425901?text=${encodeURIComponent(msg)}`, '_blank');
}
// (تم ترك الدوال الأخرى للاتصال والدفع كما هي في كودك الأصلي)
</script>
</body>
</html>
