<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ELMOKADEM Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.35);
            --input-bg: rgba(255, 255, 255, 0.07);
            --placeholder-color: rgba(255, 255, 255, 0.4); /* اللون الرصاصي الموحد */
        }

        /* تنسيق عام للخانات */
        .premium-input {
            width: 100%;
            padding: 14px 45px 14px 16px; 
            border-radius: 14px;
            background: var(--input-bg);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            outline: none;
            min-height: 52px;
            text-align: right;
        }

        /* إصلاح خانة التاريخ */
        input[type="date"] {
            position: relative;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            left: 10px;
            cursor: pointer;
            opacity: 0.6;
        }

        /* ضمان توحيد لون النص البديل (Placeholder) */
        ::placeholder { color: var(--placeholder-color) !important; opacity: 1; }
        
        /* جعل النص داخل الـ select الموعد باللون الرصاصي قبل الاختيار */
        select:invalid { color: var(--placeholder-color); }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-group label { font-family: 'Cairo', sans-serif; font-size: 13px; color: rgba(255, 255, 255, 0.75); margin-bottom: 6px; display: block; padding-right: 4px; }
        
        /* الأيقونات */
        .input-group::after {
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            right: 16px; /* نقل الأيقونة لليمين لتجنب التداخل */
            bottom: 15px;
            color: var(--gold);
            font-size: 15px;
            pointer-events: none;
        }
        .date-type::after { content: "\f133"; }
        .select-type::after { content: "\f0db"; }
        .name-type::after { content: "\f007"; }
        .address-type::after { content: "\f3c5"; }
        .hall-type::after { content: "\f0f4"; }
    </style>
</head>
<body>
    <!-- محتوى الـ Modal المحدث -->
    <div id="booking-modal">
        <div class="premium-modal-content">
            <!-- باقي الكود كما هو -->
            <div class="input-group date-type">
                <label>التاريخ (Date):</label>
                <input type="date" id="session-date" class="premium-input" required>
            </div>

            <div id="time-selection" class="input-group select-type" style="display:none;">
                <label>موعد كتب الكتاب (Timing):</label>
                <select id="session-time" class="premium-input">
                    <option value="" disabled selected>اضغط لتحديد الموعد</option>
                    <option value="بعد صلاة العصر">بعد صلاة العصر </option>
                    <option value="بعد صلاة المغرب">بعد صلاة المغرب </option>
                    <option value="بعد صلاة العشاء">بعد صلاة العشاء </option>
                </select>
            </div>
            <!-- باقي الكود -->
        </div>
    </div>
</body>
</html>
