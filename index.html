<div id="vfcash-modal">
    <div class="modal-content" style="text-align:center;">
        <h3 style="color:var(--gold); margin-bottom: 20px;">الدفع والتحويل</h3>
        
        <input type="text" inputmode="decimal" id="cash-amount" placeholder=" أدخل المبلغ هنا " style="text-align:center; font-size:18px; margin-bottom: 10px;">
        
        <button class="confirm-btn" onclick="makeVFCashCall()" style="background:#e60000; color:white; margin-top: 0;">اتصال وتحويل فودافون كاش</button>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <p style="font-size: 11px; color: #888; margin-bottom: 8px;">لنسخ الرقم والتحويل عن طريق انستا باي</p>
        <div class="copy-box" onclick="copyNumber('01092217287')" style="padding: 6px 12px; max-width: 200px; margin: 0 auto; border-radius: 8px;">
            <span id="target-number" style="font-family: 'Montserrat', sans-serif; font-size: 14px; color: #fff; font-weight: 500;">01092217287</span>
            <i class="fas fa-copy" style="font-size: 12px;"></i>
        </div>
        <small id="copy-msg" style="color: #2ecc71; display: none; margin-top: 5px; font-size: 10px;">تم النسخ!</small>

        <p onclick="closeVFCash()" style="color:#888; cursor:pointer; margin-top: 20px; font-size: 13px;">إغلاق</p>
    </div>
</div>
