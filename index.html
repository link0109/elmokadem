<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ELMOKADEM Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-blur: rgba(255, 255, 255, 0.08); --border-color: rgba(255, 255, 255, 0.2); --gold: #d4af37; --vfcash-color: #e60000; --orange-color: #ff6600; }
        body { margin: 0; font-family: 'Montserrat', 'Cairo', sans-serif; background: #0f0f0f url('background.jpeg') no-repeat center center/cover; display: flex; justify-content: center; overflow-y: auto; }
        .overlay { backdrop-filter: blur(15px) saturate(160%); -webkit-backdrop-filter: blur(15px) saturate(160%); background: rgba(0, 0, 0, 0.7); width: 100%; min-height: 100vh; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        .profile { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 20px; }
        .brand-container { text-align: center; margin-bottom: 12px; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }
        .button { display: flex; align-items: center; background: var(--bg-blur); border: 1px solid var(--border-color); color: white; text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px; border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer; }
        .icon-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 18px; color: #fff; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 15px; padding-right: 42px; }
        .fb .icon-box { background: #1877F2; } .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); } .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); } .wa .icon-box { background: #25D366; } .call .icon-box { background: #444; } .vfcash .icon-box { background: var(--gold); color: #000; }
        .booking-btn { border: 2px solid var(--gold); background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 100%); }
        #booking-modal, #call-modal, #payment-selection-modal, #vfcash-modal, #orange-cash-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 5000; justify-content: center; align-items: center; }
        .premium-modal-content { background: linear-gradient(145deg, rgba(40, 40, 40, 0.95) 0%, rgba(25, 25, 25, 0.98) 100%); border: 1px solid rgba(212, 175, 55, 0.35); padding: 35px 25px; border-radius: 28px; width: 90%; max-width: 390px; text-align: right; color: white; }
        .modal-header-title { text-align: center; color: var(--gold); margin: 0 0 25px 0; font-size: 25px; font-family: 'Cairo', sans-serif; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group label { font-family: 'Cairo', sans-serif; font-size: 13px; color: rgba(255, 255, 255, 0.75); margin-bottom: 6px; display: block; }
        .premium-input { width: 100%; padding: 14px 16px; border-radius: 14px; background: #000; color: white; border: 1px solid rgba(255, 255, 255, 0.2); font-family: 'Cairo', sans-serif; font-size: 15px; outline: none; text-align: right; }
        .premium-confirm-btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 15px; font-family: 'Cairo', sans-serif; }
        .close-modal-text { text-align: center; color: rgba(255, 255, 255, 0.5); cursor: pointer; margin-top: 20px; font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>
<!-- (بقية هيكل الـ HTML الخاص بك كما هو تماماً مع إضافة خيار السيشن كاجوال في القائمة) -->
<div id="booking-modal">
    <div class="premium-modal-content">
        <h3 class="modal-header-title">تفاصيل الحجز</h3>
        <div class="input-group">
            <label>المناسبة (Event Type):</label>
            <select id="session-type" class="premium-input" onchange="handleConditionalFields()">
                <option value="" disabled selected>اضغط لاختيار المناسبة</option>
                <option value="سيشن زفاف">سيشن زفاف (Wedding Session)</option>
                <option value="سيشن زفاف و قاعة">سيشن زفاف وقاعة (Session & Party)</option>
                <option value="سيشن كتب كتاب">سيشن كتب كتاب (Katb Ktab Session)</option>
                <option value="كتب كتاب في البيت">كتب كتاب في البيت (Katb Ktab)</option>
                <option value="سيشن خطوبة">سيشن خطوبة (Engagement Session)</option>
                <option value="سيشن خطوبة و قاعة">سيشن خطوبة و قاعة (Session & Party)</option>
                <option value="خطوبة في البيت أو كافيه">خطوبة في البيت أو كافيه (Home or Cafe Engagement)</option>
                <option value="قاعة أو فرح">قاعة أو فرح (Party)</option>
                <option value="سيشن كاجوال">سيشن كاجوال (Casual Session)</option>
                <option value="عيد ميلاد">عيد ميلاد (Birthday)</option>
                <option value="حفلة تخرج">حفلة تخرج (Graduation Party)</option>
            </select>
        </div>
        <div class="input-group">
            <label>التاريخ (Date):</label>
            <input type="date" id="session-date" class="premium-input" required>
        </div>
        <!-- (إضافة باقي الحقول كما كانت في كودك الأصلي) -->
        <div id="hall-selection" class="input-group" style="display:none;">
            <label>اسم القاعة / مكان الفرح (Hall Name):</label>
            <input type="text" id="hall-name" class="premium-input" placeholder="ادخل اسم القاعة أو مكان الفرح">
        </div>
        <div class="input-group">
            <label>الاسم (Full Name):</label>
            <input type="text" id="user-name" class="premium-input" placeholder="اكتب اسم حضرتك هنا">
        </div>
        <button class="premium-confirm-btn" onclick="sendToWhatsApp()">تأكيد الحجز</button>
        <p onclick="closeBooking()" class="close-modal-text">إغلاق</p>
    </div>
</div>

<script>
// (استعدت نفس روابط الـ Web Apps الخاصة بك)
function sendToWhatsApp() {
    const name = document.getElementById('user-name').value;
    const type = document.getElementById('session-type').value;
    const date = document.getElementById('session-date').value;
    const hall = document.getElementById('hall-name').value;
    
    // منطق إرسال اسم المناسبة بالعربي فقط مع إضافة القاعة بين قوسين للتقويم
    const calendarEventName = hall ? `${type} (${hall})` : type;
    
    const bookingData = { name: name, type: type, date: date, hall: hall };

    // الإرسال للتقويم (بالاسم المعدل) وللشيت (بالاسم الأصلي)
    fetch(calendarURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...bookingData, type: calendarEventName }) });
    fetch(accountsURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(bookingData) });
    
    // ... باقي دالة الواتساب
}
</script>
</body>
</html>
