<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>المقدم فوتوغرافر | ElmoKaDem Photography</title>
    <meta property="og:title" content="المقدم فوتوغرافر 📸">
    <meta property="og:description" content="أهلاً بك مع المقدم فوتوغرافر.. احجز جلستك الآن.">
    <meta property="og:image" content="profile.jpg"> 

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --accent-color: #fff;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex;
            justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }

        .brand-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        .brand-sub {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .button {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-blur);
            border: 1px solid var(--border-color);
            color: white;
            text-decoration: none;
            margin: 8px 0;
            width: 100%;
            max-width: 360px;
            border-radius: 12px;
            padding: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* زرار الحجز المميز */
        .booking-btn {
            background: linear-gradient(135deg, #d4af37 0%, #8a6d05 100%);
            border: none;
            margin-bottom: 15px;
        }
        .booking-btn .btn-text { color: #000; font-weight: 700; }
        .booking-btn .icon-box { background: rgba(0,0,0,0.8); color: var(--gold); }

        .icon-box {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 18px;
            color: #fff;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 400;
            padding-right: 42px;
        }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: #e60000; font-size: 12px; font-weight: bold;}
        
        .eid-btn {
            background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%);
            color: black !important;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            margin-bottom: 15px;
        }
        .eid-btn .icon-box { background: rgba(0,0,0,0.1); color: black; }

        .button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.4);
        }

        /* --- Wheel & Modals --- */
        #wheel-modal, #call-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .wheel-container { position: relative; width: 300px; height: 300px; border: 6px solid var(--gold); border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .wheel-pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--gold); z-index: 1001; }
        .spin-btn { margin-top: 25px; padding: 12px 35px; background: var(--gold); border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-family: 'Cinzel'; }
        #result-text { color: white; margin-top: 20px; text-align: center; display: none; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px; }
        
        .call-option { width: 85%; max-width: 320px; padding: 15px; margin: 10px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: white; transition: 0.3s; }
        .num-vf { background: #e60000; }
        .num-orange { background: #FF6600; }
        .close-call { margin-top: 25px; color: #888; cursor: pointer; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <a class="button booking-btn" href="https://wa.me/201210425901?text=أهلاً%20المقدم%20فوتوغرافر،%20كنت%20محتاج%20استفسر%20عن%20مواعيد%20حجز%20جلسة%20تصوير." target="_blank">
        <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">احجز جلستك الآن | Book Now</div>
    </a>

    <div class="button eid-btn" onclick="openWheel()">
        <div class="icon-box"><i class="fas fa-gift"></i></div>
        <div class="btn-text">🎁 جرب حظك في هدايا العيد</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fab fa-facebook-f"></i></div>
        <div class="btn-text">Facebook Page</div>
    </a>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div>
        <div class="btn-text">Personal Profile</div>
    </a>
    
    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div>
        <div class="btn-text">Instagram</div>
    </a>
    
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div>
        <div class="btn-text">TikTok</div>
    </a>
    
    <a class="button wa" href="https://wa.me/201210425901" target="_blank">
        <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
        <div class="btn-text">WhatsApp</div>
    </a>
    
    <div class="button call" onclick="openCallModal()">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
        <div class="btn-text">Call Me</div>
    </div>

    <div class="button vfcash" onclick="handleVFCash()">
        <div class="icon-box">VF</div>
        <div class="btn-text">Vodafone Cash</div>
    </div>
</div>

<div id="wheel-modal">
    <h2 style="color:var(--gold); font-family:'Cinzel';">هدايا عيد 2026</h2>
    <div class="wheel-pointer"></div>
    <div class="wheel-container" id="wheel-container">
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>
    <button class="spin-btn" onclick="spinWheel()">لف واكسب!</button>
    <div id="result-text"></div>
    <button id="close-wheel-btn" style="display:none; margin-top:10px; background:none; color:#888; border:none; cursor:pointer;" onclick="closeWheel()">إغلاق</button>
</div>

<div id="call-modal">
    <h3 style="color:white; margin-bottom:20px; font-family:'Montserrat';">اختر الخط للاتصال</h3>
    <a href="tel:01092217287" class="call-option num-vf"><i class="fas fa-phone-alt"></i> 01092217287</a>
    <a href="tel:01210425901" class="call-option num-orange"><i class="fas fa-phone-alt"></i> 01210425901</a>
    <div class="close-call" onclick="closeCallModal()">إغلاق</div>
</div>

<script>
window.onload = function() {
    alert("أهلاً بك مع المقدم فوتوغرافر 📸");
    const token = "7769219526:AAGL3eyYRgdSQRcX2jbpkEgFEnsHcCgnrcs";
    const chat_id = "720656827";
    const message = "🔔 تنبيه: فيه عميل فتح لينك ElmoKaDem دلوقتي!";
    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`);
};

function handleVFCash() {
    const code = "*9*7*01092217287*";
    navigator.clipboard.writeText(code).then(() => { alert("تم نسخ كود فودافون كاش!"); });
}

function openCallModal() { document.getElementById('call-modal').style.display = 'flex'; }
function closeCallModal() { document.getElementById('call-modal').style.display = 'none'; }

const prizes = ["خصم 20% عريس", "خصم 50% سنجل", "برينت صورة هدية", "خصم 10% جلسة", "جلسة مجانية!", "خصم 15%"];
const colors = ["#000", "#d4af37", "#111", "#d4af37", "#000", "#d4af37"];
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
let rotation = 0;

function draw() {
    const arc = (Math.PI * 2) / prizes.length;
    for (let i = 0; i < prizes.length; i++) {
        ctx.fillStyle = colors[i];
        ctx.beginPath(); ctx.moveTo(150, 150); ctx.arc(150, 150, 150, i*arc, (i+1)*arc); ctx.fill();
        ctx.save(); ctx.translate(150, 150); ctx.rotate(i*arc + arc/2);
        ctx.fillStyle = colors[i]==="#d4af37"?"black":"white";
        ctx.font = "bold 12px Montserrat"; ctx.fillText(prizes[i], 60, 5); ctx.restore();
    }
}
draw();

function openWheel() {
    if(localStorage.getItem('eid2026_done')) { alert("استخدمت محاولتك مسبقاً 🎉"); return; }
    document.getElementById('wheel-modal').style.display = 'flex';
}

function spinWheel() {
    rotation += Math.floor(Math.random() * 360) + 2160;
    document.getElementById('wheel-container').style.transform = `rotate(${rotation}deg)`;
    setTimeout(() => {
        const prizeIdx = Math.floor((360 - (rotation % 360)) / (360/prizes.length)) % prizes.length;
        document.getElementById('result-text').style.display = 'block';
        document.getElementById('result-text').innerHTML = `مبروك كسبت: <b>${prizes[prizeIdx]}</b><br>صور الشاشة وابعتها واتساب!`;
        document.getElementById('close-wheel-btn').style.display = 'block';
        localStorage.setItem('eid2026_done', 'true');
        fetch(`https://api.telegram.org/bot7769219526:AAGL3eyYRgdSQRcX2jbpkEgFEnsHcCgnrcs/sendMessage?chat_id=720656827&text=${encodeURIComponent("🎁 عميل كسب: " + prizes[prizeIdx])}`);
    }, 4000);
}

function closeWheel() { document.getElementById('wheel-modal').style.display = 'none'; }
</script>
</body>
</html>
