<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ElmoKaDem Photography</title>
    <meta property="og:title" content="المقدم فوتوغرافر">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
            --voda-red: #e60000;
            --orange-color: #FF6600;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex; justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%; min-height: 100vh;
            padding: 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }

        .profile {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--gold); margin-bottom: 20px;
        }

        .brand-container { text-align: center; margin-bottom: 30px; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }

        .button {
            display: flex; align-items: center; background: var(--bg-blur);
            border: 1px solid var(--border-color); color: white;
            text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px;
            border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer;
        }

        .icon-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 18px; color: #fff; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 15px; padding-right: 42px; }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: var(--gold); color: #000; }
        
        .booking-btn { 
            border: 2px solid var(--gold); 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 100%);
            margin-bottom: 20px;
        }

        #booking-modal, #call-modal, #deposit-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }

        .modal-content { background: #111; padding: 25px; border-radius: 25px; border: 1px solid var(--gold); width: 85%; max-width: 380px; text-align: center; color: white; }
        
        input { 
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; 
            background: #000; color: #fff; border: 1px solid #333; 
            box-sizing: border-box; font-family: 'Cinzel', serif;
            font-size: 22px; outline: none; text-align: center; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .confirm-btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .confirm-btn:active { transform: scale(0.95); }
        
        /* MODERN WALLET DESIGN */
        .wallet-grid { display: flex; gap: 15px; margin-top: 25px; }
        .wallet-card { 
            flex: 1; padding: 20px 10px; border-radius: 20px; border: 1px solid #222; 
            background: #181818; cursor: pointer; transition: 0.4s; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }
        .wallet-logo { width: 45px; height: 45px; margin-bottom: 10px; object-fit: contain; }
        .wallet-card span { font-size: 11px; font-weight: bold; color: #777; letter-spacing: 0.5px; }
        
        .wallet-card.voda-active { border-color: var(--voda-red); background: rgba(230, 0, 0, 0.05); }
        .wallet-card.voda-active span { color: #fff; }
        
        .wallet-card.orange-active { border-color: var(--orange-color); background: rgba(255, 102, 0, 0.05); }
        .wallet-card.orange-active span { color: #fff; }
        
        .preview-box {
            background: rgba(0,0,0,0.5); border: 1px dashed #444; padding: 15px; 
            margin-top: 20px; border-radius: 15px; text-align: center;
        }
        .preview-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px;}
        .preview-code { display: block; font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button booking-btn" onclick="openBooking()">
        <div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">احجز الآن | Book Now</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div><div class="btn-text">Personal Profile</div>
    </a>
    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fab fa-facebook-f"></i></div><div class="btn-text">Facebook Page</div>
    </a>
    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div>
    </a>
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div>
    </a>
    <a class="button wa" href="https://wa.me/201210425901" target="_blank">
        <div class="icon-box"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div>
    </a>
    <div class="button call" onclick="openCallModal()">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div><div class="btn-text">Call Me</div>
    </div>
    <div class="button vfcash" onclick="openDepositModal()">
        <div class="icon-box"><i class="fas fa-receipt"></i></div><div class="btn-text">Deposit | تأكيد الحجز</div>
    </div>
</div>

<div id="deposit-modal">
    <div class="modal-content">
        <h3 style="color:var(--gold); font-family:'Cinzel'; margin:0;">Deposit</h3>
        <p style="font-size: 11px; color: #555; margin-bottom: 5px;">تأكيد الحجز عبر المحفظة</p>
        
        <div class="wallet-grid">
            <div class="wallet-card" id="card-voda" onclick="selectWallet('voda')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Vodafone_Logo.png" class="wallet-logo" alt="VF">
                <span>فودافون كاش</span>
            </div>
            <div class="wallet-card" id="card-orange" onclick="selectWallet('orange')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Orange_logo.svg/1024px-Orange_logo.svg.png" class="wallet-logo" alt="Orange">
                <span>أورانج كاش</span>
            </div>
        </div>

        <div id="deposit-inputs" style="display:none; margin-top:20px;">
            <input type="number" id="dep-amount" placeholder="0.00" oninput="updatePreview()">
            
            <div class="preview-box">
                <span class="preview-label">سيتم طلب الكود التالي:</span>
                <span class="preview-code" id="code-display">---</span>
            </div>

            <button class="confirm-btn" id="final-btn" onclick="callNow()">اتصال الآن | Call Now</button>
        </div>

        <p onclick="closeDepositModal()" style="color:#444; cursor:pointer; margin-top:20px; font-size:13px; font-weight:bold;">إغلاق</p>
    </div>
</div>

<script>
// الأكواد الأساسية
let activeWallet = '';
const vodaNum = "01092217287";
const orangeNum = "01210425901";

function openDepositModal() { document.getElementById('deposit-modal').style.display = 'flex'; }
function closeDepositModal() { 
    document.getElementById('deposit-modal').style.display = 'none';
    activeWallet = '';
    document.getElementById('deposit-inputs').style.display = 'none';
    document.getElementById('card-voda').className = 'wallet-card';
    document.getElementById('card-orange').className = 'wallet-card';
    document.getElementById('dep-amount').value = '';
}

function selectWallet(w) {
    activeWallet = w;
    document.getElementById('deposit-inputs').style.display = 'block';
    document.getElementById('card-voda').className = 'wallet-card' + (w === 'voda' ? ' voda-active' : '');
    document.getElementById('card-orange').className = 'wallet-card' + (w === 'orange' ? ' orange-active' : '');
    const btn = document.getElementById('final-btn');
    btn.style.background = (w === 'voda') ? 'var(--voda-red)' : 'var(--orange-color)';
    btn.style.color = '#fff';
    updatePreview();
}

function updatePreview() {
    const amount = document.getElementById('dep-amount').value || "0";
    let code = "---";
    if(activeWallet === 'voda') code = `*9*7*${vodaNum}*${amount}#`;
    if(activeWallet === 'orange') code = `#${orangeNum}*${amount}*1*7115#`;
    document.getElementById('code-display').innerText = code;
}

function callNow() {
    const amount = document.getElementById('dep-amount').value;
    if(!amount || amount <= 0) { alert("يرجى إدخال مبلغ العربون"); return; }
    const code = document.getElementById('code-display').innerText;
    window.location.href = "tel:" + encodeURIComponent(code);
}
</script>
</body>
</html>
