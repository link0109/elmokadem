<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ElmoKaDem Photography</title>
    <meta property="og:title" content="المقدم فوتوغرافر">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex; justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.7);
            width: 100%; min-height: 100vh;
            padding: 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }

        .profile {
            width: 120px; height: 120px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--gold); margin-bottom: 20px;
        }

        .brand-container { text-align: center; margin-bottom: 30px; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }

        .button {
            display: flex; align-items: center; background: var(--bg-blur);
            border: 1px solid var(--border-color); color: white;
            text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px;
            border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer;
        }

        .icon-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 18px; color: #fff; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 15px; padding-right: 42px; }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }
        .vfcash .icon-box { background: #e60000; font-size: 12px; font-weight: bold; }
        
        .booking-btn { 
            border: 2px solid var(--gold); 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 100%);
            margin-bottom: 20px;
        }

        #booking-modal, #call-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 380px; text-align: right; color: white; }
        
        select, input { 
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; 
            background: #000; color: white; border: 1px solid #333; 
            box-sizing: border-box; font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            outline: none;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .confirm-btn { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button booking-btn" onclick="openBooking()">
        <div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">احجز الآن | Book Now</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fas fa-user-circle"></i></div><div class="btn-text">Personal Profile</div>
    </a>

    <a class="button fb" href="https://www.facebook.com/share/1AsaePx6C3/?mibextid=wwXIfr" target="_blank">
        <div class="icon-box"><i class="fab fa-facebook-f"></i></div><div class="btn-text">Facebook Page</div>
    </a>

    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank">
        <div class="icon-box"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div>
    </a>

    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank">
        <div class="icon-box"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div>
    </a>

    <a class="button wa" href="https://wa.me/201210425901" target="_blank">
        <div class="icon-box"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div>
    </a>

    <div class="button call" onclick="openCallModal()">
        <div class="icon-box"><i class="fas fa-phone-alt"></i></div><div class="btn-text">Call Me</div>
    </div>

    <div class="button vfcash" onclick="handleVFCash()">
        <div class="icon-box">VF</div><div class="btn-text">Vodafone Cash</div>
    </div>
</div>

<div id="booking-modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:var(--gold);">تفاصيل الحجز</h3>
        
        <label>المناسبة:</label>
        <select id="session-type" onchange="toggleTime()">
            <option value="" disabled selected>اضغط لاختيار نوع المناسبة</option>
            <option value="سيشن زفاف (Wedding Session)">سيشن زفاف (Wedding Session)</option>
            <option value="سيشن زفاف وقاعة (Wedding and Party)">سيشن زفاف وقاعة (Wedding and Party)</option>
            <option value="سيشن خطوبة (Engagement Session)">سيشن خطوبة (Engagement Session)</option>
            <option value="سيشن خطوبة وقاعة (Engagement and Party)">سيشن خطوبة وقاعة (Engagement and Party)</option>
            <option value="خطوبة في البيت (Home Engagement)">خطوبة في البيت (Home Engagement)</option>
            <option value="كتب كتاب (Katb Ktab)">كتب كتاب (Katb Ktab)</option>
        </select>

        <label style="display:block; margin-top:15px;">التاريخ:</label>
        <input type="date" id="session-date">

        <div id="time-selection" style="display:none; margin-top:15px;">
            <label>موعد كتب الكتاب:</label>
            <select id="session-time">
                <option value="بعد صلاة العصر">بعد صلاة العصر</option>
                <option value="بعد صلاة المغرب">بعد صلاة المغرب</option>
                <option value="بعد صلاة العشاء">بعد صلاة العشاء</option>
            </select>
        </div>

        <label style="display:block; margin-top:15px;">اسم حضرتك:</label>
        <input type="text" id="user-name" placeholder="اكتب اسم حضرتك هنا">

        <button class="confirm-btn" onclick="sendToWhatsApp()">تأكيد الحجز عبر واتساب</button>
        <p onclick="closeBooking()" style="text-align:center; color:#888; cursor:pointer; margin-top:15px;">إغلاق</p>
    </div>
</div>

<div id="call-modal">
    <div class="modal-content" style="text-align:center;">
        <h3 style="color:var(--gold);">اختر الخط للاتصال</h3>
        <a href="tel:01092217287" style="display:block; background:#e60000; padding:15px; color:white; border-radius:10px; text-decoration:none; margin:10px 0;">01092217287</a>
        <a href="tel:01210425901" style="display:block; background:#FF6600; padding:15px; color:white; border-radius:10px; text-decoration:none; margin:10px 0;">01210425901</a>
        <p onclick="closeCallModal()" style="color:#888; cursor:pointer; margin-top:15px;">إغلاق</p>
    </div>
</div>

<script>
// الروابط الخاصة بك
const calendarURL = 'https://script.google.com/macros/s/AKfycbwnadXjg8Sm57vCNWXNKQuU7MV8FUqz4TO1FG2buopRie47OSx2G1_UhmV23RzExGRj/exec';
const accountsURL = 'https://script.google.com/macros/s/AKfycbzStaRvSR37qf-OSoATI88o-dpOWBEJ8mj0O8nK5jTx2Ow-QJDEeWmRC4PQd7HQ-Rj-/exec';

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('utm_source') || "رابط مباشر";
    const token = "7769219526:AAGL3eyYRgdSQRcX2jbpkEgFEnsHcCgnrcs";
    const chat_id = "720656827";
    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
        const device = navigator.userAgent.includes("iPhone") ? "iPhone 🍏" : "Android 🤖";
        const now = new Date().toLocaleString('ar-EG');
        const msg = `📸 زائر جديد\n📱 الجهاز: ${device}\n📍 المكان: ${data.city}\n🔗 المصدر: ${source}\n⏰ الوقت: ${now}`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`);
    });
};

function openBooking() { document.getElementById('booking-modal').style.display = 'flex'; }
function closeBooking() { document.getElementById('booking-modal').style.display = 'none'; }
function toggleTime() {
    const val = document.getElementById('session-type').value;
    document.getElementById('time-selection').style.display = val.includes("كتب كتاب") ? "block" : "none";
}

function sendToWhatsApp() {
    const name = document.getElementById('user-name').value;
    const type = document.getElementById('session-type').value;
    const date = document.getElementById('session-date').value;
    const time = document.getElementById('session-time').value;

    if(!type || !date || !name) { alert("من فضلك كمل البيانات الأول يا فندم"); return; }

    const bookingData = JSON.stringify({ name: name, type: type, date: date, time: time });

    // إرسال البيانات للتقويم ولشيت الحسابات في وقت واحد
    Promise.all([
        fetch(calendarURL, { method: 'POST', mode: 'no-cors', cache: 'no-cache', body: bookingData }),
        fetch(accountsURL, { method: 'POST', mode: 'no-cors', cache: 'no-cache', body: bookingData })
    ]).then(() => {
        console.log("تم الإرسال للتقويم والحسابات");
    }).catch(err => console.error("خطأ في الربط:", err));

    let msg = `أهلاً يا مقدم، محتاج أحجز:\nالاسم: ${name}\nالمناسبة: ${type}\nالتاريخ: ${date}`;
    if(type.includes("كتب كتاب")) msg += `\nالموعد: ${time}`;
    
    window.open(`https://wa.me/201210425901?text=${encodeURIComponent(msg)}`, '_blank');
    closeBooking();
}

function handleVFCash() {
    const code = "*9*7*01092217287*";
    navigator.clipboard.writeText(code).then(() => {
        alert("تم نسخ كود فودافون كاش! اذهب للوحة الاتصال واعمل لصق، ثم اكتب المبلغ المراد تحويله، ثم شباك.");
    });
}

function openCallModal() { document.getElementById('call-modal').style.display = 'flex'; }
function closeCallModal() { document.getElementById('call-modal').style.display = 'none'; }
</script>
</body>
</html>
