<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقدم فوتوغرافر | ElmoKaDem Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
            --gold: #d4af37;
            --voda: #e60000;
            --orange: #FF6600;
        }

        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            background: #0f0f0f url('background.jpeg') no-repeat center center/cover fixed;
            display: flex; justify-content: center;
        }

        .overlay {
            backdrop-filter: blur(15px) saturate(160%); -webkit-backdrop-filter: blur(15px) saturate(160%);
            background: rgba(0, 0, 0, 0.75); width: 100%; min-height: 100vh;
            padding: 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
        }

        .profile { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 20px; object-fit: cover; }
        .brand-name { font-family: 'Cinzel', serif; color: #fff; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; text-align: center; }
        .brand-sub { color: var(--gold); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; text-align: center; }

        .button {
            display: flex; align-items: center; background: var(--bg-blur); border: 1px solid var(--border-color);
            color: white; text-decoration: none; margin: 8px 0; width: 100%; max-width: 360px;
            border-radius: 12px; padding: 6px; transition: 0.3s; cursor: pointer;
        }

        /* الزرار الشفاف المطلوب */
        .booking-deposit-btn {
            border: 1.5px solid var(--gold) !important;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent) !important;
            margin-bottom: 20px !important;
        }

        .icon-box { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 18px; color: #fff; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 15px; padding-right: 42px; }

        .fb .icon-box { background: #1877F2; }
        .ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tk .icon-box { background: #000; border: 1px solid rgba(255,255,255,0.2); }
        .wa .icon-box { background: #25D366; }
        .call .icon-box { background: #444; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); width: 85%; max-width: 380px; text-align: right; color: white; }
        
        select, input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; background: #000; color: white; border: 1px solid #333; box-sizing: border-box; outline: none; font-family: 'Montserrat', sans-serif;}
        .confirm-btn { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* ستايل محفظة الكاش الجديد */
        .wallet-container { display: flex; gap: 10px; margin-top: 20px; }
        .wallet-box { flex: 1; padding: 15px 5px; border-radius: 12px; border: 1px solid #333; background: #111; cursor: pointer; text-align: center; transition: 0.3s; }
        .wallet-box i { font-size: 24px; margin-bottom: 8px; }
        .wallet-box span { display: block; font-size: 10px; font-weight: 600; }
        
        .voda-box.active { border-color: var(--voda); background: rgba(230, 0, 0, 0.1); }
        .voda-box i { color: var(--voda); }
        .orange-box.active { border-color: var(--orange); background: rgba(255, 102, 0, 0.1); }
        .orange-box i { color: var(--orange); }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ElmoKaDem">
    <div class="brand-container">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button booking-deposit-btn" onclick="openDeposit()">
        <div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-wallet"></i></div>
        <div class="btn-text">Booking Deposit | تأكيد الحجز</div>
    </div>

    <div class="button" style="border: 2px solid var(--gold);" onclick="openBooking()">
        <div class="icon-box" style="background:var(--gold); color:black;"><i class="fas fa-calendar-check"></i></div><div class="btn-text">احجز الآن | Book Now</div>
    </div>

    <a class="button fb" href="https://www.facebook.com/share/1ZXYjBxA2C/" target="_blank"><div class="icon-box"><i class="fas fa-user-circle"></i></div><div class="btn-text">Personal Profile</div></a>
    <a class="button ig" href="https://www.instagram.com/elmokadem_photographer" target="_blank"><div class="icon-box"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div></a>
    <a class="button tk" href="https://www.tiktok.com/@elmokadem.photographar" target="_blank"><div class="icon-box"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div></a>
    <a class="button wa" href="https://wa.me/201210425901" target="_blank"><div class="icon-box"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div></a>
    <div class="button call" onclick="openCallModal()"><div class="icon-box"><i class="fas fa-phone-alt"></i></div><div class="btn-text">Call Me</div></div>
</div>

<div id="booking-modal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:var(--gold);">تفاصيل الحجز</h3>
        <label>المناسبة:</label>
        <select id="session-type" onchange="toggleTime()">
            <option value="" disabled selected>اضغط لاختيار نوع المناسبة</option>
            <option value="سيشن زفاف (Wedding Session)">سيشن زفاف (Wedding Session)</option>
            <option value="سيشن زفاف وقاعة (Wedding and Party)">سيشن زفاف وقاعة (Wedding and Party)</option>
            <option value="سيشن خطوبة (Engagement Session)">سيشن خطوبة (Engagement Session)</option>
            <option value="سيشن خطوبة وقاعة (Engagement and Party)">سيشن خطوبة وقاعة (Engagement and Party)</option>
            <option value="قاعة أو فرح (Party)">قاعة أو فرح (Party)</option>
            <option value="عيد ميلاد (Birthday)">عيد ميلاد (Birthday)</option>
            <option value="خطوبة في البيت (Home Engagement)">خطوبة في البيت (Home Engagement)</option>
            <option value="كتب كتاب (Katb Ktab)">كتب كتاب (Katb Ktab)</option>
        </select>
        <label style="display:block; margin-top:15px;">التاريخ:</label>
        <input type="date" id="session-date">
        <div id="time-selection" style="display:none; margin-top:15px;">
            <label>موعد كتب الكتاب:</label>
            <select id="session-time">
                <option value="بعد صلاة العصر">بعد صلاة العصر</option>
                <option value="بعد صلاة المغرب">بعد صلاة المغرب</option>
                <option value="بعد صلاة العشاء">بعد صلاة العشاء</option>
            </select>
        </div>
        <label style="display:block
