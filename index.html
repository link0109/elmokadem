<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMOKADEM | Professional Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --voda: #e60000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.3);
        }

        body { margin: 0; background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .main-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('background.jpeg') center/cover; z-index: -1; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
        
        .brand-logo { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; margin-bottom: 15px; }
        .brand-title { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 4px; margin: 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .brand-tagline { font-size: 9px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        .links-container { width: 100%; max-width: 380px; margin-top: 30px; }
        .link-card {
            display: flex; align-items: center; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            margin-bottom: 12px; padding: 12px; text-decoration: none; color: #fff;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .link-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.05); }
        .icon-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; margin-right: 15px; font-size: 18px; }
        
        .booking-card { border: 1.5px solid var(--gold); background: rgba(212,175,55,0.1); }
        .voda-btn { border: 1px solid var(--voda); }

        /* Modal */
        #deposit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); z-index: 9999; justify-content: center; align-items: center; }
        .premium-card { background: #0f0f0f; width: 85%; max-width: 360px; border-radius: 25px; border: 1px solid var(--border); padding: 30px 20px; text-align: center; }
        
        .voda-logo { width: 60px; margin-bottom: 15px; }
        .amount-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; text-align: center; font-size: 28px; font-family: 'Cinzel', serif; outline: none; margin: 20px 0; }
        .preview-code { background: rgba(212,175,55,0.03); border: 1px dashed var(--gold); padding: 15px; border-radius: 12px; font-family: 'Cinzel'; color: var(--gold); font-size: 16px; }
        
        .call-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--voda); color: #fff; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .close-txt { margin-top: 20px; color: #555; font-size: 12px; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div class="main-bg"></div>

<div class="container">
    <img src="profile.jpg" class="brand-logo" alt="ELMOKADEM">
    <h1 class="brand-title">ELMOKADEM</h1>
    <div class="brand-tagline">Wedding Photographer</div>

    <div class="links-container">
        <a href="https://wa.me/201210425901" class="link-card booking-card" onclick="trackClick('Book Now')">
            <div class="icon-box" style="background:var(--gold); color:#000;"><i class="fas fa-calendar-check"></i></div>
            <span style="flex-grow:1; text-align:center;">Book Now | احجز الآن</span>
        </a>

        <a href="https://www.facebook.com/share/1AsaePx6C3/" class="link-card" onclick="trackClick('Facebook')">
            <div class="icon-box" style="background:#1877F2;"><i class="fab fa-facebook-f"></i></div>
            <span style="flex-grow:1; text-align:center;">Facebook Page</span>
        </a>
        <a href="https://www.instagram.com/elmokadem_photographer" class="link-card" onclick="trackClick('Instagram')">
            <div class="icon-box" style="background:linear-gradient(45deg, #f09433, #dc2743, #bc1888);"><i class="fab fa-instagram"></i></div>
            <span style="flex-grow:1; text-align:center;">Instagram</span>
        </a>
        <a href="https://www.tiktok.com/@elmokadem.photographar" class="link-card" onclick="trackClick('TikTok')">
            <div class="icon-box" style="background:#000; border:1px solid #333;"><i class="fab fa-tiktok"></i></div>
            <span style="flex-grow:1; text-align:center;">TikTok</span>
        </a>

        <div class="link-card voda-btn" style="cursor:pointer;" onclick="openVodaModal()">
            <div class="icon-box" style="background:var(--voda);"><i class="fas fa-shield-alt"></i></div>
            <span style="flex-grow:1; text-align:center;">تأكيد الحجز | Secure Deposit</span>
        </div>
    </div>
</div>

<div id="deposit-modal">
    <div class="premium-card">
        <img src="https://img.icons8.com/color/144/vodafone.png" class="voda-logo">
        <h3 style="font-family:'Cinzel'; color:var(--gold); margin:0;">Vodafone Cash</h3>
        <input type="number" class="amount-input" id="amt" placeholder="000" oninput="updateCode()">
        <div class="preview-code" id="v-code">*9*7*01092217287*0#</div>
        <button class="call-btn" onclick="makeCall()">Call Now | اتصال الآن</button>
        <span class="close-txt" onclick="closeVodaModal()">إغلاق</span>
    </div>
</div>

<script>
    const BOT_TOKEN = '7548777977:AAGw-IovV78E_0KWhf7Ie0D9S7V-4eR4o4M';
    const CHAT_ID = '1238478474';

    // وظيفة إرسال البيانات للتليجرام بكل التفاصيل
    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const params = { chat_id: CHAT_ID, text: message, parse_mode: 'HTML' };
        try { await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(params)}); } catch(e) {}
    }

    // تتبع الزائر عند الدخول ومعرفة المصدر
    window.onload = function() {
        const referrer = document.referrer.toLowerCase();
        let source = "Direct Entry (رابط مباشر)";
        if(referrer.includes('facebook')) source = "Facebook 🔵";
        else if(referrer.includes('instagram')) source = "Instagram 📸";
        else if(referrer.includes('tiktok')) source = "TikTok 🎵";

        const info = `
🌟 <b>زائر جديد للموقع</b>
━━━━━━━━━━━━━
📍 <b>المكان:</b> Cairo (تقريبي)
📱 <b>الجهاز:</b> ${navigator.platform}
🔗 <b>المصدر:</b> ${source}
⏰ <b>الوقت:</b> ${new Date().toLocaleString('ar-EG')}
━━━━━━━━━━━━━`;
        sendToTelegram(info);
    };

    function trackClick(btnName) {
        sendToTelegram(`🔘 <b>قام الزائر بالضغط على:</b> ${btnName}`);
    }

    function openVodaModal() { 
        document.getElementById('deposit-modal').style.display = 'flex';
        trackClick('فتح واجهة الإيداع');
    }
    
    function closeVodaModal() { document.getElementById('deposit-modal').style.display = 'none'; }

    function updateCode() {
        const val = document.getElementById('amt').value || "0";
        document.getElementById('v-code').innerText = `*9*7*01092217287*${val}#`;
    }

    function makeCall() {
        const code = document.getElementById('v-code').innerText;
        trackClick(`محاولة إيداع مبلغ: ${document.getElementById('amt').value}`);
        window.location.href = "tel:" + encodeURIComponent(code);
    }
</script>
</body>
</html>
