<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMOKADEM | Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --voda-red: #e60000;
            --orange-color: #FF6600;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; background: #000 url('background.jpeg') no-repeat center center/cover fixed;
            font-family: 'Montserrat', sans-serif; color: white; overflow-x: hidden;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.85); min-height: 100vh; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; backdrop-filter: blur(10px);
        }

        .profile { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; }
        .brand-name { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 4px; margin: 0; }
        .brand-sub { color: var(--gold); font-size: 10px; letter-spacing: 5px; margin-top: 5px; text-transform: uppercase; }

        /* أزرار الصفحة الرئيسية */
        .button {
            display: flex; align-items: center; background: var(--glass);
            border: 1px solid var(--border); color: white; text-decoration: none;
            margin: 10px 0; width: 100%; max-width: 360px; border-radius: 15px;
            padding: 8px; transition: 0.3s; cursor: pointer;
        }
        .icon-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 18px; }
        .btn-text { flex-grow: 1; text-align: center; font-size: 14px; font-weight: 500; padding-right: 40px; }

        /* الزرار الشفاف الاحترافي */
        .deposit-trigger {
            border: 1.5px solid var(--gold);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), transparent);
            margin-bottom: 25px;
        }

        /* المودال */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(15px);
        }
        .modal-content {
            background: #111; padding: 30px 20px; border-radius: 25px;
            border: 1px solid var(--gold); width: 85%; max-width: 380px; text-align: center;
        }

        /* قايمة المحافظ الملونة */
        .wallet-grid { display: flex; gap: 15px; margin-top: 25px; }
        .wallet-option {
            flex: 1; padding: 20px 10px; border-radius: 18px; background: #1a1a1a;
            border: 1px solid #333; cursor: pointer; transition: 0.3s;
        }
        .wallet-option i { font-size: 30px; margin-bottom: 10px; }
        .wallet-option span { display: block; font-size: 11px; font-weight: 600; }

        .voda-opt.active { border-color: var(--voda-red); background: rgba(230,0,0,0.05); }
        .voda-opt i { color: var(--voda-red); }
        .orange-opt.active { border-color: var(--orange-color); background: rgba(255,102,0,0.05); }
        .orange-opt i { color: var(--orange-color); }

        /* منطقة إدخال المبلغ والكود */
        .input-area { display: none; margin-top: 25px; animation: slideUp 0.4s ease; }
        input {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #333;
            color: #fff; font-size: 24px; text-align: center; padding: 10px; outline: none; margin-bottom: 15px;
        }
        .code-preview { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #444; }
        .code-preview span { font-family: monospace; color: var(--gold); font-size: 18px; }
        
        .call-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; font-size: 15px; transition: 0.3s;
        }

        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="overlay">
    <img src="profile.jpg" class="profile" alt="ELMOKADEM">
    <div style="text-align:center; margin-bottom: 30px;">
        <h1 class="brand-name">ELMOKADEM</h1>
        <div class="brand-sub">Wedding Photographer</div>
    </div>

    <div class="button deposit-trigger" onclick="openDeposit()">
        <div class="icon-box" style="background:var(--gold); color:#000;"><i class="fas fa-calendar-check"></i></div>
        <div class="btn-text">Booking Deposit | تأكيد الحجز</div>
    </div>

    <a class="button" href="https://wa.me/201210425901"><div class="icon-box" style="background:#25D366;"><i class="fab fa-whatsapp"></i></div><div class="btn-text">WhatsApp</div></a>
    <a class="button" href="https://www.instagram.com/elmokadem_photographer"><div class="icon-box" style="background:#E4405F;"><i class="fab fa-instagram"></i></div><div class="btn-text">Instagram</div></a>
    <a class="button" href="https://www.tiktok.com/@elmokadem.photographar"><div class="icon-box" style="background:#000;"><i class="fab fa-tiktok"></i></div><div class="btn-text">TikTok</div></a>
</div>

<div id="deposit-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold); font-family:'Cinzel';">DEPOSIT</h3>
        <p style="font-size: 12px; color: #777;">اختر المحفظة لتحويل العربون</p>

        <div class="wallet-grid">
            <div class="wallet-option voda-opt" id="v-opt" onclick="setWallet('voda')">
                <i class="fas fa-mobile-alt"></i>
                <span>فودافون كاش</span>
                <span>Vodafone Cash</span>
            </div>
            <div class="wallet-option orange-opt" id="o-opt" onclick="setWallet('orange')">
                <i class="fas fa-phone-alt"></i>
                <span>أورانج كاش</span>
                <span>Orange Cash</span>
            </div>
        </div>

        <div id="payment-ui" class="input-area">
            <input type="number" id="amt" placeholder="0.00" oninput="updateCode()">
            <div class="code-preview">
                <p style="font-size: 9px; color: #555; margin:0 0 5px 0;">TRANSFER CODE</p>
                <span id="display-code">*9*7*...#</span>
            </div>
            <button id="final-btn" class="call-btn" onclick="executeCall()">اتصال الآن | Call Now</button>
        </div>

        <p onclick="closeDeposit()" style="margin-top:25px; color:#555; cursor:pointer; font-size:13px;">إلغاء العملية</p>
    </div>
</div>

<script>
    let wallet = '';
    const V_NUM = "01092217287";
    const O_NUM = "01210425901";

    function openDeposit() { document.getElementById('deposit-modal').style.display = 'flex'; }
    function closeDeposit() { 
        document.getElementById('deposit-modal').style.display = 'none';
        wallet = '';
        document.getElementById('payment-ui').style.display = 'none';
        document.querySelectorAll('.wallet-option').forEach(el => el.classList.remove('active'));
    }

    function setWallet(w) {
        wallet = w;
        document.getElementById('payment-ui').style.display = 'block';
        document.getElementById('v-opt').classList.toggle('active', w === 'voda');
        document.getElementById('o-opt').classList.toggle('active', w === 'orange');
        
        const btn = document.getElementById('final-btn');
        btn.style.background = (w === 'voda' ? 'var(--voda-red)' : 'var(--orange-color)');
        btn.style.color = 'white';
        updateCode();
    }

    function updateCode() {
        const val = document.getElementById('amt').value || "0";
        let code = (wallet === 'voda') ? `*9*7*${V_NUM}*${val}#` : `#${O_NUM}*${val}*1*7115#`;
        document.getElementById('display-code').innerText = code;
    }

    function executeCall() {
        const val = document.getElementById('amt').value;
        if(!val || val <= 0) { alert("دخل المبلغ الأول يا فنان"); return; }
        window.location.href = "tel:" + encodeURIComponent(document.getElementById('display-code').innerText);
    }
</script>
</body>
</html>
