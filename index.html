<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMOKADEM | Professional Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --voda: #e60000;
            --orange: #ff6600;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* تحسين الخلفية لتكون أكثر فخامة */
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('background.jpeg') center/cover;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 20px; min-height: 100vh;
        }

        .brand-logo {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid var(--gold); padding: 5px;
            margin-bottom: 25px; transition: 0.5s;
        }

        .brand-title {
            font-family: 'Cinzel', serif; font-size: 34px; letter-spacing: 6px;
            margin: 0; color: #fff; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .brand-tagline {
            font-size: 10px; letter-spacing: 5px; color: var(--gold);
            text-transform: uppercase; margin-top: 8px; opacity: 0.8;
        }

        /* تصميم المودال الاحترافي */
        #deposit-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            z-index: 9999; justify-content: center; align-items: center;
        }

        .premium-card {
            background: #0f0f0f; width: 90%; max-width: 400px;
            border-radius: 30px; border: 1px solid var(--border);
            padding: 35px 25px; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-header h2 {
            font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold);
            margin: 0 0 10px 0; letter-spacing: 3px;
        }

        .wallet-selector {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;
        }

        .option-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px 10px; border-radius: 20px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }

        .option-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 15px; }
        .option-card span { font-size: 12px; font-weight: 600; color: #888; }

        /* تفعيل الاختيار */
        .option-card.active-voda { border-color: var(--voda); background: rgba(230, 0, 0, 0.1); transform: translateY(-5px); }
        .option-card.active-orange { border-color: var(--orange); background: rgba(255, 102, 0, 0.1); transform: translateY(-5px); }
        .active-voda span, .active-orange span { color: #fff; }

        /* منطقة الإدخال المطورة */
        .input-group { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        
        .amount-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid #333; color: #fff; text-align: center;
            font-size: 32px; font-family: 'Cinzel', serif; padding: 10px;
            outline: none; transition: 0.3s;
        }
        .amount-input:focus { border-color: var(--gold); }

        .live-preview {
            margin-top: 25px; padding: 20px; background: rgba(212,175,55,0.03);
            border-radius: 15px; border: 1px dashed rgba(212,175,55,0.2);
        }

        .call-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 25px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .close-link { margin-top: 25px; color: #444; font-size: 13px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<div class="main-bg"></div>

<div class="container">
    <img src="profile.jpg" class="brand-logo" alt="ELMOKADEM">
    <h1 class="brand-title">ELMOKADEM</h1>
    <div class="brand-tagline">Excellence in Every Frame</div>

    <div onclick="openModal()" style="margin-top: 50px; cursor: pointer; border: 1px solid var(--gold); padding: 15px 40px; border-radius: 50px; background: rgba(212,175,55,0.1);">
        <span style="font-size: 14px; letter-spacing: 2px; color: var(--gold);">SECURE DEPOSIT | تأكيد الحجز</span>
    </div>
</div>

<div id="deposit-modal">
    <div class="premium-card">
        <div class="modal-header">
            <h2>DEPOSIT</h2>
            <p style="font-size: 11px; color: #555; margin: 0;">الرجاء اختيار وسيلة الدفع المناسبة</p>
        </div>

        <div class="wallet-selector">
            <div class="option-card" id="voda-card" onclick="selectType('voda')">
                <img src="https://img.icons8.com/color/144/vodafone.png" alt="Vodafone">
                <span>فودافون كاش</span>
            </div>
            <div class="option-card" id="orange-card" onclick="selectType('orange')">
                <img src="https://img.icons8.com/color/144/orange.png" alt="Orange">
                <span>أورانج كاش</span>
            </div>
        </div>

        <div id="input-area" class="input-group">
            <input type="number" class="amount-input" id="amount" placeholder="000" oninput="syncCode()">
            
            <div class="live-preview">
                <p style="font-size: 9px; color: #666; margin: 0 0 8px 0; letter-spacing: 1px;">USSD AUTO-CODE</p>
                <span id="final-code" style="font-family: 'Cinzel'; color: var(--gold); font-size: 18px;">*9*7*---#</span>
            </div>

            <button id="main-action" class="call-btn" onclick="executeCall()">Call & Confirm</button>
        </div>

        <div class="close-link" onclick="closeModal()">إلغاء العملية</div>
    </div>
</div>

<script>
    let currentWallet = '';
    const VODA_NUM = "01092217287";
    const ORANGE_NUM = "01210425901";

    function openModal() { document.getElementById('deposit-modal').style.display = 'flex'; }
    function closeModal() { 
        document.getElementById('deposit-modal').style.display = 'none';
        resetUI();
    }

    function selectType(type) {
        currentWallet = type;
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('voda-card').className = 'option-card' + (type === 'voda' ? ' active-voda' : '');
        document.getElementById('orange-card').className = 'option-card' + (type === 'orange' ? ' active-orange' : '');
        
        const btn = document.getElementById('main-action');
        btn.style.background = type === 'voda' ? 'var(--voda)' : 'var(--orange)';
        btn.style.color = '#fff';
        syncCode();
    }

    function syncCode() {
        const amt = document.getElementById('amount').value || "0";
        let code = "---";
        if(currentWallet === 'voda') code = `*9*7*${VODA_NUM}*${amt}#`;
        if(currentWallet === 'orange') code = `#${ORANGE_NUM}*${amt}*1*7115#`;
        document.getElementById('final-code').innerText = code;
    }

    function executeCall() {
        const amt = document.getElementById('amount').value;
        if(!amt || amt <= 0) { alert("يرجى إدخال المبلغ أولاً"); return; }
        const code = document.getElementById('final-code').innerText;
        window.location.href = "tel:" + encodeURIComponent(code);
    }

    function resetUI() {
        currentWallet = '';
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('voda-card').className = 'option-card';
        document.getElementById('orange-card').className = 'option-card';
        document.getElementById('amount').value = '';
    }
</script>

</body>
</html>
